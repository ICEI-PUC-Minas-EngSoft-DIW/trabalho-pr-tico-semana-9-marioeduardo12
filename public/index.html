<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Ecommerce</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Mini Ecommerce</h1>
    </header>

    <section class="filtros">
        <input type="text" id="campoBusca" placeholder="Buscar por nome...">
        <select id="filtroCategoria">
            <option value="todas">Todas as categorias</option>
        </select>
    </section>

    <main>
        <section id="listaProdutos" class="lista-produtos"></section>

        <section id="areaDetalhes" class="area-detalhes">
            <h2>Detalhes do Produto</h2>
            <p>Clique em "Ver detalhes" em algum produto para ver as informações aqui.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
